services:
  frontend:
    image: ghcr.io/gyrosofwar/wikilaps-frontend:latest
    ports:
      - "3001:3000"
    environment:
      BACKEND_URL: "http://backend:13252"
    depends_on:
      - backend

  backend:
    image: ghcr.io/gyrosofwar/wikilaps-backend:latest
    environment:
      DATABASE_URL: "postgres://postgres:wikilaps-is-cool@postgres/postgres"
      SERVER_HOST: "0.0.0.0"
    depends_on:
      - postgres

  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: "wikilaps-is-cool"
    volumes:
      - postgres-data:/var/lib/postgresql/

volumes:
  postgres-data:
